name: Build GBAEmulator IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: GBAEmulator
  BUNDLE_ID: com.yourname.gbaemulator
  SCHEME: GBAEmulator
  XCODE_VERSION: "15.4"
  IOS_DEPLOYMENT_TARGET: "17.0"
  MGBA_TAG: "0.10.3"

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Cache mGBA static library
        id: cache-mgba
        uses: actions/cache@v4
        with:
          path: mgba/build-ios/install
          key: mgba-${{ env.MGBA_TAG }}-ios-arm64-v1

      - name: Clone mGBA source
        if: steps.cache-mgba.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.MGBA_TAG }} \
            https://github.com/mgba-emu/mgba.git mgba

      - name: Build mGBA for iOS (arm64)
        if: steps.cache-mgba.outputs.cache-hit != 'true'
        run: |
          cd mgba
          mkdir -p build-ios && cd build-ios
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          cmake .. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED=OFF \
            -DBUILD_STATIC=ON \
            -DUSE_FFMPEG=OFF \
            -DUSE_MAGICK=OFF \
            -DUSE_MINIZIP=OFF \
            -DUSE_EPOXY=OFF \
            -DUSE_LIBZIP=OFF \
            -DUSE_PNG=OFF \
            -DUSE_EDITLINE=OFF \
            -DUSE_GDB_STUB=OFF \
            -DUSE_DISCORD_RPC=OFF \
            -DUSE_SQLITE3=OFF \
            -DUSE_LZMA=OFF \
            -DUSE_ZLIB=ON \
            -DENABLE_DEBUGGERS=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_GBA=ON \
            -DENABLE_GB=OFF \
            -DENABLE_GBP=OFF \
            -DENABLE_NDS=OFF \
            -DBUILD_QT=OFF \
            -DBUILD_SDL=OFF \
            -DBUILD_LIBRETRO=OFF \
            -DCMAKE_INSTALL_PREFIX=./install
          cmake --build . --config Release --target install \
            -- -sdk iphoneos -arch arm64 \
               CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=

      - name: Install xcodegen
        run: |
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip \
            -o xcodegen.zip
          unzip -o xcodegen.zip -d /tmp/xcodegen
          sudo mv /tmp/xcodegen/xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          xcodegen version

      - name: Write project.yml and Info.plist
        run: python3 .github/scripts/write_project_files.py

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Build for iOS (no signing)
        run: |
          xcodebuild \
            -project GBAEmulator.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            CONFIGURATION_BUILD_DIR=$(pwd)/build/Release-iphoneos \
            clean build \
            | xcpretty --color --report junit --output build/test-results.xml \
            || true
          test -d build/Release-iphoneos/${{ env.APP_NAME }}.app

      - name: Package unsigned IPA
        run: |
          APP_PATH=build/Release-iphoneos/${{ env.APP_NAME }}.app
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../${{ env.APP_NAME }}-unsigned.ipa Payload

      # ── Optional signing block — uncomment + add repo secrets to enable ────
      #
      # - name: Import certificate & provisioning profile
      #   env:
      #     P12_BASE64:     ${{ secrets.IOS_P12_BASE64 }}
      #     P12_PASSWORD:   ${{ secrets.IOS_P12_PASSWORD }}
      #     PROFILE_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      #   run: |
      #     security create-keychain -p "" build.keychain
      #     security set-keychain-settings -lut 21600 build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #     echo "$P12_BASE64" | base64 --decode > cert.p12
      #     security import cert.p12 -k build.keychain -P "$P12_PASSWORD" \
      #       -T /usr/bin/codesign -T /usr/bin/xcodebuild
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
      #     UUID=$(grep -aA1 'UUID' profile.mobileprovision | grep -io '[-A-F0-9]\{36\}')
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp profile.mobileprovision \
      #       ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      #
      # - name: Re-sign and repackage IPA
      #   run: |
      #     IDENTITY=$(security find-identity -v -p codesigning build.keychain \
      #       | head -1 | awk '{print $2}')
      #     codesign --force --sign "$IDENTITY" \
      #       --entitlements entitlements.plist \
      #       build/Release-iphoneos/${{ env.APP_NAME }}.app
      #     cd build/ipa && zip -r ../${{ env.APP_NAME }}-signed.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-ipa
          path: build/${{ env.APP_NAME }}-unsigned.ipa
          retention-days: 30

      - name: Upload build results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build/test-results.xml
          retention-days: 7
