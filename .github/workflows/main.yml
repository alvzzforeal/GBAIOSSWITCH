name: Build GBAEmulator IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: GBAEmulator
  BUNDLE_ID: com.yourname.gbaemulator
  SCHEME: GBAEmulator
  XCODE_VERSION: "15.4"
  IOS_DEPLOYMENT_TARGET: "17.0"
  MGBA_TAG: "0.10.3"

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-14          # Apple Silicon — Xcode 15/16 available

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Select Xcode ───────────────────────────────────────────────────
      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      # ─── 3. Cache mGBA build ───────────────────────────────────────────────
      - name: Cache mGBA static library
        id: cache-mgba
        uses: actions/cache@v4
        with:
          path: mgba/build-ios/install
          key: mgba-${{ env.MGBA_TAG }}-ios-arm64-v1

      # ─── 4. Clone & build mGBA (only on cache miss) ────────────────────────
      - name: Clone mGBA source
        if: steps.cache-mgba.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.MGBA_TAG }} \
            https://github.com/mgba-emu/mgba.git mgba

      - name: Build mGBA for iOS (arm64)
        if: steps.cache-mgba.outputs.cache-hit != 'true'
        run: |
          cd mgba
          mkdir -p build-ios && cd build-ios

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          cmake .. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=17.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED=OFF \
            -DBUILD_STATIC=ON \
            -DUSE_FFMPEG=OFF \
            -DUSE_MAGICK=OFF \
            -DUSE_MINIZIP=OFF \
            -DUSE_EPOXY=OFF \
            -DUSE_LIBZIP=OFF \
            -DENABLE_DEBUGGERS=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_GBA=ON \
            -DENABLE_GB=OFF \
            -DENABLE_GBP=OFF \
            -DENABLE_NDS=OFF \
            -DBUILD_QT=OFF \
            -DBUILD_SDL=OFF \
            -DBUILD_LIBRETRO=OFF \
            -DUSE_PNG=OFF \
            -DUSE_EDITLINE=OFF \
            -DUSE_GDB_STUB=OFF \
            -DUSE_DISCORD_RPC=OFF \
            -DUSE_SQLITE3=OFF \
            -DUSE_LZMA=OFF \
            -DUSE_ZLIB=ON \
            -DCMAKE_INSTALL_PREFIX=./install

          cmake --build . --config Release --target install \
            -- -sdk iphoneos -arch arm64 \
               CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY=

      # ─── 5. Generate Xcode project via xcodegen ────────────────────────────
      #   If you already have a .xcodeproj committed, delete this step and the
      #   project.yml file, then set XCODEPROJ to your committed project path.
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Write project.yml
        run: |
          MGBA_INCLUDE=$(pwd)/mgba/build-ios/install/include
          MGBA_LIB=$(pwd)/mgba/build-ios/install/lib

          cat > project.yml <<EOF
          name: GBAEmulator
          options:
            bundleIdPrefix: com.yourname
            deploymentTarget:
              iOS: "17.0"
            xcodeVersion: "${{ env.XCODE_VERSION }}"

          settings:
            base:
              PRODUCT_BUNDLE_IDENTIFIER: ${{ env.BUNDLE_ID }}
              SWIFT_VERSION: "5.9"
              ENABLE_BITCODE: NO
              OTHER_CPLUSPLUSFLAGS: "-std=c++17"
              SWIFT_OBJC_BRIDGING_HEADER: "GBAEmulator/GBAEmulator-Bridging-Header.h"
              OTHER_SWIFT_FLAGS: "-DMGBA_INTEGRATED"
              HEADER_SEARCH_PATHS: "${MGBA_INCLUDE}"
              LIBRARY_SEARCH_PATHS: "${MGBA_LIB}"
              OTHER_LDFLAGS: "-lmgba -lc++ -lz"
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO

          targets:
            GBAEmulator:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: GBAEmulator/Sources
                  name: Sources
                - path: GBAEmulator/GBAEmulator-Bridging-Header.h
              settings:
                base:
                  INFOPLIST_FILE: GBAEmulator/Info.plist
              dependencies:
                - framework: AVFoundation.framework
                  implicit: true
                - framework: GameController.framework
                  implicit: true
                - framework: MultipeerConnectivity.framework
                  implicit: true
                - library: libmgba.a
                  path: "${MGBA_LIB}/libmgba.a"
                  embed: false
          EOF

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      # ─── 6. Create Info.plist (if not already in repo) ─────────────────────
      - name: Create Info.plist
        run: |
          mkdir -p GBAEmulator
          cat > GBAEmulator/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>GBAEmulator</string>
            <key>CFBundleIdentifier</key><string>com.yourname.gbaemulator</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>UIFileSharingEnabled</key><true/>
            <key>LSSupportsOpeningDocumentsInPlace</key><true/>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key><string>GBA ROM</string>
                <key>CFBundleTypeRole</key><string>Viewer</string>
                <key>CFBundleTypeExtensions</key><array><string>gba</string></array>
                <key>LSItemContentTypes</key><array><string>public.data</string></array>
              </dict>
            </array>
            <key>NSLocalNetworkUsageDescription</key>
            <string>GBA Emulator uses your local network for multiplayer link cable emulation.</string>
            <key>NSBonjourServices</key>
            <array>
              <string>_gba-link._tcp</string>
              <string>_gba-link._udp</string>
            </array>
            <key>UIBackgroundModes</key><array><string>audio</string></array>
            <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          PLIST

      # ─── 7. Build (no signing) ─────────────────────────────────────────────
      - name: Build for iOS (no signing)
        run: |
          xcodebuild \
            -project GBAEmulator.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            CONFIGURATION_BUILD_DIR=$(pwd)/build/Release-iphoneos \
            clean build \
            | xcpretty --color --report junit --output build/test-results.xml \
            || true   # xcpretty returns non-zero on warnings; ignore

          # Ensure build actually succeeded
          test -d build/Release-iphoneos/${{ env.APP_NAME }}.app

      # ─── 8. Package into IPA (unsigned) ────────────────────────────────────
      - name: Package unsigned IPA
        run: |
          APP_PATH=build/Release-iphoneos/${{ env.APP_NAME }}.app
          IPA_DIR=build/ipa
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r ../${{ env.APP_NAME }}-unsigned.ipa Payload
          cd ..
          echo "IPA_PATH=$(pwd)/build/${{ env.APP_NAME }}-unsigned.ipa" >> $GITHUB_ENV

      # ─── 9. (Optional) Sign with a certificate stored in Secrets ───────────
      #   Uncomment this block and add the secrets listed below to your repo
      #   to produce a properly signed IPA for sideloading or TestFlight.
      #
      # - name: Import certificate & provisioning profile
      #   env:
      #     P12_BASE64:      ${{ secrets.IOS_P12_BASE64 }}        # base64 of .p12
      #     P12_PASSWORD:    ${{ secrets.IOS_P12_PASSWORD }}
      #     PROFILE_BASE64:  ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      #   run: |
      #     # Create a temp keychain
      #     security create-keychain -p "" build.keychain
      #     security set-keychain-settings -lut 21600 build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "" build.keychain
      #
      #     # Import certificate
      #     echo "$P12_BASE64" | base64 --decode > cert.p12
      #     security import cert.p12 -k build.keychain -P "$P12_PASSWORD" \
      #       -T /usr/bin/codesign -T /usr/bin/xcodebuild
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #
      #     # Install provisioning profile
      #     echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
      #     UUID=$(grep -aA1 'UUID' profile.mobileprovision | grep -io '[-A-F0-9]\{36\}')
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp profile.mobileprovision \
      #       ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      #
      # - name: Re-sign IPA
      #   run: |
      #     IDENTITY=$(security find-identity -v -p codesigning build.keychain \
      #       | head -1 | awk '{print $2}')
      #     codesign --force --sign "$IDENTITY" \
      #       --entitlements entitlements.plist \
      #       build/Release-iphoneos/${{ env.APP_NAME }}.app
      #
      #     # Re-package
      #     cd build/ipa && zip -r ../${{ env.APP_NAME }}-signed.ipa Payload

      # ─── 10. Upload IPA as artifact ─────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-ipa
          path: build/${{ env.APP_NAME }}-unsigned.ipa
          retention-days: 30

      # ─── 11. Upload build results ───────────────────────────────────────────
      - name: Upload build results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: build/test-results.xml
          retention-days: 7
